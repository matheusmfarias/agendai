services:
  postgres:
    image: postgres:17-alpine
    container_name: agenda-zap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agendazap
      POSTGRES_USER: agendazap
      POSTGRES_PASSWORD: agendazap
    ports:
      - "5432:5432"
    volumes:
      - agenda_zap_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agendazap -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agenda_zap_postgres_data:
