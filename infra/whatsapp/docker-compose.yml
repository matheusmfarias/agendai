services:
  evolution-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - evolution_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.6
    restart: unless-stopped
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      evolution-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - evolution_instances_data:/evolution/instances
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --header='apikey: $${AUTHENTICATION_API_KEY}' -qO- http://localhost:8080/instance/fetchInstances >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  evolution_postgres_data:
  evolution_redis_data:
  evolution_instances_data:
